name: Feature request
description: Propose a Lumen VPN improvement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user, operator, or maintainer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Android client
        - Windows desktop
        - Backend/API
        - Node agent/runtime
        - Deploy/installer
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and privacy notes
      description: Describe any sensitive data, networking, or operational impact.
