name: Build release images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release image tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || (github.ref_type == 'tag' && github.ref_name || format('main-{0}', github.sha)) }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: ghcr.io/rim2393/lumen-api
            context: apps/api
            dockerfile: Dockerfile
          - name: web
            image: ghcr.io/rim2393/lumen-web
            context: apps/web
            dockerfile: Dockerfile
          - name: node-agent
            image: ghcr.io/rim2393/lumen-node-agent
            context: apps/node-agent
            dockerfile: Dockerfile
          - name: subscription
            image: ghcr.io/rim2393/lumen-subscription-page
            context: apps/lumen-edge
            dockerfile: Dockerfile

    steps:
      - name: Validate release version
        shell: bash
        run: |
          if [[ -z "${RELEASE_VERSION}" || "${RELEASE_VERSION}" == "latest" || "${RELEASE_VERSION}" == *"/"* || "${RELEASE_VERSION}" == *":"* ]]; then
            echo "Release version must be a non-empty image tag and must not be latest."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          provenance: true
          sbom: true
          tags: ${{ matrix.image }}:${{ env.RELEASE_VERSION }}
          labels: |
            org.opencontainers.image.source=https://github.com/rim2393/full-revna-like-projekt
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.RELEASE_VERSION }}

  verify-images:
    name: Verify pushed images
    runs-on: ubuntu-24.04
    needs: build-and-push
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect manifests
        shell: bash
        run: |
          set -euo pipefail
          images=(
            ghcr.io/rim2393/lumen-api:${RELEASE_VERSION}
            ghcr.io/rim2393/lumen-web:${RELEASE_VERSION}
            ghcr.io/rim2393/lumen-node-agent:${RELEASE_VERSION}
            ghcr.io/rim2393/lumen-subscription-page:${RELEASE_VERSION}
          )

          for image in "${images[@]}"; do
            echo "::group::${image}"
            docker buildx imagetools inspect "${image}"
            echo "::endgroup::"
          done

  notify-installer-release:
    name: Notify installer release pipeline
    runs-on: ubuntu-24.04
    needs: verify-images
    if: ${{ github.event_name != 'push' || github.ref_type == 'tag' }}
    steps:
      - name: Dispatch signed manifest pipeline
        shell: bash
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.LUMEN_PUBLIC_REPO_TOKEN }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${PUBLIC_REPO_TOKEN}" ]; then
            echo "LUMEN_PUBLIC_REPO_TOKEN is not configured; skipping public installer dispatch."
            exit 0
          fi
          payload="$(
            jq -n \
              --arg event_type "product-release-published" \
              --arg version "${RELEASE_VERSION}" \
              --arg source_sha "${SOURCE_SHA}" \
              --arg source_run_id "${SOURCE_RUN_ID}" \
              '{
                event_type: $event_type,
                client_payload: {
                  version: $version,
                  source_sha: $source_sha,
                  source_run_id: $source_run_id,
                  deploy: "true"
                }
              }'
          )"
          curl -fsS \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PUBLIC_REPO_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/rim2393/lumen_vpn/dispatches \
            -d "${payload}"
