name: Build release images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release image tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  build-and-push:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: ghcr.io/rim2393/lumen-api
            context: apps/api
            dockerfile: apps/api/Dockerfile
          - name: web
            image: ghcr.io/rim2393/lumen-web
            context: apps/web
            dockerfile: apps/web/Dockerfile
          - name: node-agent
            image: ghcr.io/rim2393/lumen-node-agent
            context: apps/node-agent
            dockerfile: apps/node-agent/Dockerfile
          - name: subscription
            image: ghcr.io/rim2393/lumen-subscription-page
            context: apps/lumen-edge
            dockerfile: apps/lumen-edge/Dockerfile

    steps:
      - name: Validate release version
        shell: bash
        run: |
          if [[ -z "${RELEASE_VERSION}" || "${RELEASE_VERSION}" == "latest" || "${RELEASE_VERSION}" == *"/"* || "${RELEASE_VERSION}" == *":"* ]]; then
            echo "Release version must be a non-empty image tag and must not be latest."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: true
          sbom: true
          tags: ${{ matrix.image }}:${{ env.RELEASE_VERSION }}
          labels: |
            org.opencontainers.image.source=https://github.com/rim2393/full-revna-like-projekt
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.RELEASE_VERSION }}
