name: lumen-vpn-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  gradle:
    name: Android/Desktop Gradle
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          lfs: true
      - name: Set up JDK
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: temurin
          java-version: "17"
      - name: Validate Gradle modules
        run: ./gradlew tasks --no-daemon
      - name: Run desktop tests
        run: ./gradlew :desktop:test --no-daemon
      - name: Run Android unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

  backend:
    name: Backend API
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"
      - name: Install backend
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint backend
        working-directory: apps/api
        run: ruff check .
      - name: Test backend
        working-directory: apps/api
        run: pytest

  web:
    name: Admin web
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci
      - name: Test web
        working-directory: apps/web
        run: npm test
      - name: Build web
        working-directory: apps/web
        run: npm run build

  node-services:
    name: Node services and shared packages
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            apps/lumen-edge/package-lock.json
      - name: Run Node service tests
        run: |
          npm --prefix apps/lumen-edge ci
          npm --prefix apps/node-agent test
          npm --prefix apps/lumen-edge test
          npm --prefix packages/protocol-registry test
          npm --prefix packages/subscription-renderers test
          npm --prefix packages/subscription-schema test

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
      - name: Run shellcheck
        run: shellcheck scripts/*.sh scripts/lib/*.sh

  compose:
    name: Compose validation
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - name: Render panel compose
        run: docker compose --env-file .env.example -f deploy/compose/lumen.yml config >/tmp/lumen-compose.yml
      - name: Render node compose
        run: |
          cat > /tmp/lumen-node.env <<'EOF'
          TZ=UTC
          LUMEN_PANEL_URL=https://panel.example.com
          LUMEN_NODE_NAME=ci-node
          LUMEN_NODE_AGENT_IMAGE=ghcr.io/rim2393/lumen-node-agent:v0.1.0@sha256:b415f5f42b4104f6fbb58317e75a3b48dad9e431bd179c427ff5a907e86dfe94
          EOF
          docker compose --env-file /tmp/lumen-node.env -f deploy/compose/lumen-node.yml config >/tmp/lumen-node-compose.yml

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - name: Install scanner dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ripgrep
      - name: Run secret scan
        run: ./scripts/secret-scan.sh .

  release-manifest:
    name: Release manifest JSON
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - name: Validate JSON
        run: jq -e '.schema == "lumen.release.v1"' release/manifest.template.json
