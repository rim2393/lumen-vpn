name: Quality gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  api-openapi:
    name: API OpenAPI drift
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint OpenAPI generator
        run: python -m ruff check scripts/export_openapi.py tests/test_openapi_seed.py

      - name: Verify OpenAPI seed
        run: python -m pytest tests/test_openapi_seed.py -q
